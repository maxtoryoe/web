<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Registro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #219150; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Cliente</h2>
    <form id="clienteForm">
        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
        <div class="form-group"><label>DNI</label><input type="text" name="dni" required></div>
        <div class="form-group"><label>Dirección</label><input type="text" name="direccion" required></div>
        <div class="form-group"><label>Teléfono</label><input type="text" name="telefono" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email"></div>
        <div class="form-group"><label>Observaciones</label><textarea name="observaciones"></textarea></div>
        <button type="submit">Guardar Cliente</button>
    </form>
</div>

<script>
    const form = document.getElementById('clienteForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        fetch('TU_URL_AQUI', { method: 'POST', mode: 'no-cors', body: new FormData(form) })
        .then(() => alert('¡Guardado con éxito!'));
    });
</script>

</body>
</html>
