<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Clientes</title>
    
    <style>
        :root {
            --primary-color: #2c3e50; /* Un azul grisáceo profesional */
            --accent-color: #3498db;  /* Un azul brillante para el botón */
            --bg-color: #ecf0f1;      /* Fondo gris muy claro */
            --text-color: #333;
            --white: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px; /* Ancho máximo para PC */
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* Importante para el padding */
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            height: 120px;
            resize: vertical; /* Permite cambiar el tamaño solo verticalmente */
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.98); /* Efecto de presionado */
        }

        /* Notificación de éxito (inicialmente oculta) */
        #notificacion {
            display: none;
            background-color: #2ecc71; /* Verde éxito */
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Nuevo Registro de Cliente</h2>
    
    <div id="notificacion">¡Cliente registrado con éxito en Google Sheets!</div>

    <form id="clienteForm">
        <div class="form-group">
            <label for="nombre">Nombre Completo *</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
        </div>

        <div class="form-group">
            <label for="telefono">Teléfono / WhatsApp *</label>
            <input type="text" id="telefono" name="telefono" placeholder="Ej: +58 412 1234567" required>
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">
        </div>

        <div class="form-group">
            <label for="notas">Notas / Observaciones</label>
            <textarea id="notas" name="notas" placeholder="Detalles adicionales del cliente..."></textarea>
        </div>

        <button type="submit" id="submitBtn">Guardar Cliente</button>
    </form>
</div>

<script>
    // ⚠️ REEMPLAZA ESTO CON TU URL REAL
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwCecxo7AXrnNmB98NOtr7R2S1zk-WqdOE5lrTp2IohC8CBoCZvOESVFrztMMkdwu_J/exec';

    const form = document.getElementById('clienteForm');
    const btn = document.getElementById('submitBtn');
    const notificacion = document.getElementById('notificacion');

    form.addEventListener('submit', e => {
        e.preventDefault(); // Evita que la página se recargue

        // Cambiar el botón para mostrar que está cargando
        btn.disabled = true;
        btn.innerText = 'Guardando...';
        btn.style.backgroundColor = '#95a5a6'; // Gris mientras carga

        // Enviar los datos
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Importante para Google Apps Script
            body: new FormData(form)
        })
        .then(() => {
            // ÉXITO
            form.reset(); // Limpiar el formulario
            notificacion.style.display = 'block'; // Mostrar mensaje verde
            
            // Volver el botón a su estado normal
            btn.disabled = false;
            btn.innerText = 'Guardar Cliente';
            btn.style.backgroundColor = ''; // Vuelve al color del CSS

            // Ocultar la notificación después de 4 segundos
            setTimeout(() => {
                notificacion.style.display = 'none';
            }, 4000);
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Hubo un error al guardar. Revisa la consola.');
            btn.disabled = false;
            btn.innerText = 'Guardar Cliente';
            btn.style.backgroundColor = '';
        });
    });
</script>

</body>
</html>
