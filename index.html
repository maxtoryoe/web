<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Gestión de Clientes</title>
    <style>
        :root { --accent: #4a90e2; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        .form-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        h2 { color: #2c3e50; margin-bottom: 25px; border-left: 5px solid var(--accent); padding-left: 15px; }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #666; font-size: 0.9em; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 5px rgba(74,144,226,0.3); }
        button { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Registro de Cliente</h2>
        <form id="clienteForm">
            <div class="field"><label>Nombre Completo</label><input type="text" name="nombre" required></div>
            <div class="field"><label>DNI</label><input type="text" name="dni" required></div>
            <div class="field"><label>Dirección Exacta</label><input type="text" name="direccion" required></div>
            <div class="field"><label>Teléfono</label><input type="text" name="telefono" required></div>
            <div class="field"><label>Correo</label><input type="email" name="email" required></div>
            <div class="field"><label>Observaciones</label><textarea name="observaciones" rows="3"></textarea></div>
            <button type="submit" id="btn">Guardar Cliente</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('clienteForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('btn').innerText = 'Enviando...';
            fetch('https://script.google.com/macros/s/AKfycbxPf2ZPR206d8BO6AexBSNBGim4pECkVSnQm3-O69jDaXiQpU0NPSJ0Uz7W_04ULnx1/exec', { method: 'POST', mode: 'no-cors', body: new FormData(form) })
            .then(() => { alert('¡Registrado y correo enviado!'); form.reset(); document.getElementById('btn').innerText = 'Guardar Cliente'; });
        });
    </script>
</body>
</html>
