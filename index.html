<!DOCTYPE html>
<html>
<body>
    <h2>Registro de Clientes</h2>
    <form id="clienteForm">
        <input type="text" name="nombre" placeholder="Nombre" required><br>
        <input type="text" name="telefono" placeholder="Teléfono" required><br>
        <input type="email" name="email" placeholder="Email"><br>
        <textarea name="notas" placeholder="Notas"></textarea><br>
        <button type="submit">Guardar Cliente</button>
    </form>

    <script>
        const form = document.getElementById('clienteForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            fetch('https://script.google.com/macros/s/AKfycbwCecxo7AXrnNmB98NOtr7R2S1zk-WqdOE5lrTp2IohC8CBoCZvOESVFrztMMkdwu_J/exec', {
                method: 'POST',
                body: new FormData(form)
            }).then(() => alert('¡Cliente registrado!'));
        });
    </script>
</body>
</html>
